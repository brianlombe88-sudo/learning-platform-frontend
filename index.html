<!DOCTYPE html>
<html>
<head>
  <title>Learning Platform</title>
</head>
<body>

<h1>Welcome to Learning Platform</h1>

<h2>Register</h2>
<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<input id="password" placeholder="Password"><br>
<button onclick="register()">Register</button>

<h2>Login</h2>
<input id="loginEmail" placeholder="Email"><br>
<input id="loginPassword" placeholder="Password"><br>
<button onclick="login()">Login</button>

<h2>Create Course (Tutor Only)</h2>
<input id="title" placeholder="Course Title"><br>
<input id="description" placeholder="Description"><br>
<input id="price" placeholder="Price"><br>
<button onclick="createCourse()">Create Course</button>

<h2>Courses</h2>
<button onclick="getCourses()">Load Courses</button>
<ul id="courses"></ul>

<script>
const API = "https://learning-platform-backend-bbwo.onrender.com";

async function register() {
  await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value,
      role: "tutor"
    })
  });
  alert("Registered as tutor!");
}

async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("loginEmail").value,
      password: document.getElementById("loginPassword").value
    })
  });

  const data = await res.json();
  localStorage.setItem("token", data.token);
  alert("Logged in!");
}

async function createCourse() {
  const token = localStorage.getItem("token");

  const res = await fetch(API + "/courses", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      title: document.getElementById("title").value,
      description: document.getElementById("description").value,
      price: Number(document.getElementById("price").value)
    })
  });

  if (res.status === 403) {
    alert("Only tutors can create courses");
  } else {
    alert("Course created!");
  }
}

async function getCourses() {
  const res = await fetch(API + "/courses");
  const courses = await res.json();

  const list = document.getElementById("courses");
  list.innerHTML = "";

  courses.forEach(c => {
    const li = document.createElement("li");
    li.innerText = c.title + " - $" + c.price;
    list.appendChild(li);
  });
}
</script>

</body>
</html>
